<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAGGI Interactive Scroll Experience</title>
  <meta name="description" content="Explore the ultimate cooking journey of Maggi noodles in a premium interactive scroll-animation experience.">
  <link rel="stylesheet" href="/index.css">
</head>
<body>

  <!-- --- Preloader Screen --- -->
  <div id="preloader">
    <div class="loader-logo">MAGGI<span>.</span></div>
    <div class="loader-container">
      <div class="loader-bar" id="loader-bar"></div>
    </div>
    <div class="loader-text" id="loader-text">Loading Ingredients... 0%</div>
  </div>

  <!-- --- Sticky Scroll Container --- -->
  <div class="scroll-container" id="journey-scroll">
    <div class="canvas-wrapper">
      <canvas id="animation-canvas"></canvas>
      <div class="overlay-gradient"></div>
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
